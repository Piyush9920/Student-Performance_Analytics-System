<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Student Ranking</title>

    <style>

        body{

            font-family:Arial;
            background:#0f172a;
            padding:40px;
            color:white;

        }

        .container{

            width:900px;
            margin:auto;
            background:white;
            color:black;
            padding:30px;
            border-radius:15px;

        }

        h1{

            text-align:center;
            color:#2563eb;
            margin-bottom:30px;

        }

        table{

            width:100%;
            border-collapse:collapse;

        }

        th{

            background:#2563eb;
            color:white;
            padding:15px;

        }

        td{

            padding:14px;
            text-align:center;
            border-bottom:1px solid #ddd;

        }

        tr:hover{

            background:#f1f5f9;

        }

        .topper{

            background:gold;
            font-weight:bold;

        }

        .btn{

            display:block;
            margin-top:30px;
            text-align:center;
            text-decoration:none;
            background:#2563eb;
            color:white;
            padding:14px;
            border-radius:10px;

        }

    </style>

</head>

<body>

    <div class="container">

        <h1>Student Ranking System</h1>

        <table>

            <tr>

                <th>Rank</th>
                <th>Name</th>
                <th>Roll</th>
                <th>Course</th>
                <th>Marks</th>

            </tr>

            {% for student in students %}

            <tr
            {% if loop.index == 1 %}
                class="topper"
            {% endif %}
            >

                <td>{{ loop.index }}</td>
                <td>{{ student[1] }}</td>
                <td>{{ student[2] }}</td>
                <td>{{ student[3] }}</td>
                <td>{{ student[4] }}</td>

            </tr>

            {% endfor %}

        </table>

        <a href="/home" class="btn">
            Back To Home
        </a>

    </div>

</body>

</html>
