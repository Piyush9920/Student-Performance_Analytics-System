<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>AI Result Prediction</title>

    <style>

        body{

            font-family:Arial;
            background:#0f172a;
            color:white;
            padding:40px;

        }

        .container{

            width:500px;
            margin:auto;
            background:white;
            color:black;
            padding:40px;
            border-radius:15px;

        }

        h1{

            text-align:center;
            color:#2563eb;
            margin-bottom:30px;

        }

        input{

            width:100%;
            padding:14px;
            margin-top:15px;
            border-radius:10px;
            border:1px solid gray;

        }

        button{

            width:100%;
            padding:14px;
            margin-top:20px;
            background:#2563eb;
            color:white;
            border:none;
            border-radius:10px;
            cursor:pointer;

        }

        .result{

            margin-top:25px;
            background:#f1f5f9;
            padding:20px;
            border-radius:10px;

        }

    </style>

</head>

<body>

    <div class="container">

        <h1>

            AI Result Prediction

        </h1>

        <form method="POST">

            <input
                type="text"
                name="name"
                placeholder="Enter Student Name"
                required
            >

            <input
                type="number"
                name="marks"
                placeholder="Enter Marks"
                required
            >

            <button type="submit">

                Predict Result

            </button>

        </form>

        {% if prediction %}

        <div class="result">

            <h2>

                Student :
                {{ name }}

            </h2>

            <h2>

                Marks :
                {{ marks }}

            </h2>

            <h2>

                Prediction :
                {{ prediction }}

            </h2>

            <h2>

                Grade :
                {{ grade }}

            </h2>

            <h2>

                Status :
                {{ status }}

            </h2>

        </div>

        {% endif %}

    </div>

</body>

</html>
