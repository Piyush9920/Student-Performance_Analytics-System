<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Email Notification</title>

    <style>

        body{

            margin:0;
            padding:0;
            font-family:Arial;
            background:#0f172a;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;

        }

        .container{

            width:500px;
            background:white;
            padding:40px;
            border-radius:15px;

        }

        h1{

            text-align:center;
            color:#2563eb;
            margin-bottom:30px;

        }

        input,
        textarea{

            width:100%;
            padding:15px;
            margin-bottom:20px;
            border:1px solid #ccc;
            border-radius:10px;
            font-size:16px;

        }

        textarea{

            height:120px;
            resize:none;

        }

        button{

            width:100%;
            padding:15px;
            background:#2563eb;
            color:white;
            border:none;
            border-radius:10px;
            font-size:18px;
            cursor:pointer;

        }

        .btn{

            display:block;
            text-align:center;
            margin-top:20px;
            text-decoration:none;
            background:#0f172a;
            color:white;
            padding:15px;
            border-radius:10px;

        }

    </style>

</head>

<body>

    <div class="container">

        <h1>Email Notification</h1>

        <form action="/send_email" method="POST">

            <input
                type="text"
                name="name"
                placeholder="Enter Student Name"
                required
            >

            <input
                type="email"
                name="email"
                placeholder="Enter Email Address"
                required
            >

            <textarea
                name="message"
                placeholder="Enter Message"
                required></textarea>

            <button type="submit">

                Send Email

            </button>

        </form>

        <a href="/home" class="btn">

            Back To Home

        </a>

    </div>

</body>

</html>
