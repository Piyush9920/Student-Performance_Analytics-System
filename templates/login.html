<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Admin Login</title>

    <style>

        body{

            margin:0;
            padding:0;
            font-family:Arial;
            background:#0f172a;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;

        }

        .login-box{

            background:white;
            padding:40px;
            border-radius:15px;
            width:350px;
            text-align:center;

        }

        h1{

            margin-bottom:30px;
            color:#2563eb;

        }

        input{

            width:100%;
            padding:12px;
            margin-top:15px;
            border-radius:8px;
            border:1px solid gray;
            font-size:16px;

        }

        button{

            width:100%;
            padding:12px;
            margin-top:20px;
            border:none;
            background:#2563eb;
            color:white;
            border-radius:8px;
            font-size:16px;
            cursor:pointer;

        }

        button:hover{

            background:#1d4ed8;

        }

        .error{

            color:red;
            margin-top:15px;

        }

    </style>

</head>

<body>

    <div class="login-box">

        <h1>

            Admin Login

        </h1>

        <form action="/login_check" method="POST">

            <input
                type="text"
                name="username"
                placeholder="Enter Username"
                required
            >

            <input
                type="password"
                name="password"
                placeholder="Enter Password"
                required
            >

            <button type="submit">

                Login

            </button>

        </form>

        {% if error %}

        <div class="error">

            {{ error }}

        </div>

        {% endif %}

    </div>

</body>

</html>
